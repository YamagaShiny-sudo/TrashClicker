<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href = "https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Achievements - Animaux sous-marins</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-rendering: optimizeLegibility;
        }
        body {
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            background-color: #001219;
            background-image: url("images/background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color : #e9d8a6;
            display : block;
            image-rendering: pixelated;
        }

        /* Flèche qui apparaît au bord */
        .arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            cursor: pointer;
            transition: opacity 0.3s;
            z-index: 1000;

            opacity: 1;
        }
        .arrow.left { left: 0; }
        .arrow.right { right: 0; }

        /* Barre de menu */
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 400px;
            background-color : #005f73;
            border-right : 6px solid #0a9396;
            display : flex;
            flex-direction: column;
            color: white;
            padding: 20px;
            transform: translateX(-100%); /* caché à gauche */
            transition: transform 0.3s ease;
            z-index: 999;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #94d2bd;



            text-shadow: 
            2px 0 #000, -2px 0 #000, 
            0 2px #000, 0 -2px #000,
            2px 2px #000, -2px -2px #000,
            2px -2px #000, -2px 2px #000;
        }
        .sidebar.right {
            right: 0;
            transform: translateX(100%); /* caché à droite */
        }
        .sidebar.open.left { transform: translateX(0); }
        .sidebar.open.right { transform: translateX(0); }

        .sidebar button {
            display: block;
            font-family: 'Press Start 2P', cursive;

            font-size: 12px;

            padding: 18px;

            margin: 10px 0;

            text-transform: uppercase;

            text-align: center;

            cursor: pointer;

            background-color: transparent;

            color: #e9d8a6;

            border: 4px solid transparent;

            transition: all 0.2s;
        }
        .sidebar button:hover {
            background-color: #0a9396;
            border: 4px solid #ee9b00;
        }


        /* Contenu des onglets */
        .tab-content {
            width: 100%;
            height: 100vh;
            display: none;
            overflow: hidden;
            background: transparent;

        }
        .tab-content.active {
            display: block;
        }


        .species {
            position: absolute;
            cursor: pointer;
        }

        .species img {
            max-width: 200px;
            max-height: 200px;
            object-fit: contain;
            border-radius: 50%;
        }

        .species.locked img {
            filter: blur(3px) brightness(1.5);
            pointer-events: none;
        }


        .tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }


        /* --- POPUP --- */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .popup.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .popup-content {
            color: #ffffff; 
            font-family: Arial, sans-serif;
            /* text-shadow: 0 0 8px cyan; */
            width: 420px;
            padding: 25px;
            border-radius: 20px;

            /* effet verre futuriste */
            background: rgba(20, 20, 30, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);

            box-shadow: 0 0 25px rgba(0, 255, 255, 0.25),
                        inset 0 0 20px rgba(0, 255, 255, 0.15);

            text-align: center;
            animation: popupAppear 0.3s ease;
        }

        @keyframes popupAppear {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .popup-content img {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px cyan);
        }

        .popup-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 22px;
            cursor: pointer;
            color: cyan;
            text-shadow: 0 0 10px cyan;
        }
        #game {
            width: 100%;
            height: 100vh;
        }
        #game iframe {
            width: 100%;
            height: 100%;
            border :none;
        }       
        #achievements {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-image: url("images/background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .notice {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .notice.show {
            opacity: 1;
        }

        .notice.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Flèches -->
    <div class="arrow left">&#9654;</div>

    let score = 0;
    let previousScore = -1;
    let animations = [];

    function updateScore() {
        const saved = localStorage.getItem('trash_score');

        if (saved) {
            score = parseFloat(saved);
        }

        if (score !== previousScore) {
            previousScore = score;

           addNewSpecies();
        }
    }
    function addNewSpecies() {
        const container = document.getElementById("achievements");
        let addedSomething = null;
        speciesData.forEach(species => {
            const unlocked = score >= species.unlockedAt;
            if (!unlocked) return;

            // Check if species already exists
            const id = species.name.replace(/\s+/g, "_");

            if (container.querySelector(
                `[data-species="${id}"]`
            )) return;

            addedSomething = species.name

            // Create new species
            const div = document.createElement("div");
            div.classList.add("species");
            div.dataset.species = species.name;

            const img = document.createElement("img");
            img.src = species.img;
            img.alt = species.name;
            div.appendChild(img);

            const tooltip = document.createElement("div");
            tooltip.classList.add("tooltip");
            div.appendChild(tooltip);

            div.addEventListener("click", () => openPopup(species));

            container.appendChild(div);

            // Random position
            const containerWidth = container.clientWidth || window.innerWidth;
            const containerHeight = container.clientHeight || window.innerHeight;

            const x = Math.random() * (containerWidth - 150);
            const y = Math.random() * (containerHeight - 150);

            div.dataset.x = x;
            div.dataset.y = y;

            div.style.transform = `translate(${x}px, ${y}px)`;

            swim(div); // start animation ONLY for this new species
        });
        if (addedSomething) {
            showNewSpeciesNotice(addedSomething);
        }
    }


    function createFloatingSpecies() {

        animations.forEach(id => cancelAnimationFrame(id));
        animations = [];
        const container = document.getElementById("achievements");
        container.innerHTML = "";

        speciesData.forEach(species => {
            const div = document.createElement("div");
            div.classList.add("species");
            div.dataset.species = species.name.replace(/\s+/g, "_");

            const unlocked = score >= species.unlockedAt;
            if (!unlocked) {
                return;
            }

            const img = document.createElement("img");
            img.src = species.img;
            img.alt = species.name;
            div.appendChild(img);

            if (unlocked) {
                const tooltip = document.createElement("div");
                tooltip.classList.add("tooltip");
                div.appendChild(tooltip);
                div.addEventListener("click", () => {
                    openPopup(species);
                });

            }

            // Position initiale sans chevauchement
            // Add first so it exists in DOM
        container.appendChild(div);

        const containerWidth =
            container.clientWidth || window.innerWidth;

        const containerHeight =
            container.clientHeight || window.innerHeight;

        const x = Math.random() * (containerWidth - 150);
        const y = Math.random() * (containerHeight - 150);

        div.dataset.x = x;
        div.dataset.y = y;

        // Apply position
        div.style.transform =
            `translate(${x}px, ${y}px)`;

        swim(div);

        });
    }

    function showNewSpeciesNotice(speciesName) {
        const bar = document.getElementById("new-species-notice");
        bar.textContent = `${speciesName} ajoute dans ta repertoire!`;
        bar.classList.remove("hidden");
        bar.classList.add("show");

        // Hide after 3 seconds
        setTimeout(() => {
            bar.classList.remove("show");
            setTimeout(() => bar.classList.add("hidden"), 400);
        }, 3000);
    }


    function swim(element) {

        const container = document.getElementById("achievements");
        const size = 150;

        let speed = 0.6 + Math.random() * 0.6;
        let direction = -1;
        let animationId;
        function move() {

            let x = parseFloat(element.dataset.x);
            let y = parseFloat(element.dataset.y);

            x += speed * direction;

            const containerWidth = container.clientWidth;

            if (direction === 1 && x > containerWidth) {
                x = -size;
            } 
            else if (direction === -1 && x < -size) {
                x = containerWidth;
            }

            element.dataset.x = x;
            element.dataset.y = y;

            element.style.transform =
                `translate(${x}px, ${y}px)`;

            animationId = requestAnimationFrame(move);
        }
        animationId = requestAnimationFrame(move);

    }
    createFloatingSpecies();

    // Update score periodically
    setInterval(updateScore, 2000);

    const contents = document.querySelectorAll(".tab-content");

    // Fonction pour changer de contenu
    function switchTab(tabId) {
        contents.forEach(c => c.classList.remove("active"));

        const selected = document.getElementById(tabId);
        selected.classList.add("active");

        const gameFrame = document.querySelector("#game iframe");

        if (tabId === "game") {
            gameFrame.style.pointerEvents = "auto";
        } else {
            gameFrame.style.pointerEvents = "none";
        }

        if (tabId === "achievements") {

            // Wait one frame so layout updates
            requestAnimationFrame(() => {
            });

        }
    }

        } else {

    });

    // Fonctions boutons
    function quitGame() { alert("Quitter le jeu !"); }
    function resetScore() {

        localStorage.removeItem('trash_score');

        score = 0;
        previousScore = -1;

        createFloatingSpecies();

        console.log("Score reset");
    }

    // --- POPUP SYSTEM ---
    const popup = document.getElementById("popup");
    const popupImg = document.getElementById("popup-img");
    const popupTitle = document.getElementById("popup-title");
    const popupText = document.getElementById("popup-text");
    const popupClose = document.getElementById("popup-close");

    function openPopup(species) {
        popupImg.src = species.img;
        popupTitle.textContent = species.name;
        popupText.textContent = species.intro;

        popup.classList.remove("hidden");
    }

    popupClose.addEventListener("click", () => {
        popup.classList.add("hidden");
    });

    // fermer en cliquant en dehors
    popup.addEventListener("click", (e) => {
        if (e.target === popup) popup.classList.add("hidden");
    });


    function resizeGame() {
        const baseWidth = 1920;
        const baseHeight = 1080;

        const scale = Math.min(
            window.innerWidth / baseWidth,
            window.innerHeight / baseHeight
        );

        const iframe = document.querySelector("#game iframe");

        iframe.style.transform = `
            translate(-50%, -50%) scale(${scale})
        `;
    }

    window.addEventListener("resize", resizeGame);
    resizeGame();

</script>
